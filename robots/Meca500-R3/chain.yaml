robot_name: Meca500-R3
dh_params:  # from manufacturer specs (mm)
  d1: 135    # base to J2
  a2: 135    # upper arm length
  a3: 38     # elbow offset (X)
  d4: 120    # forearm length
  d6: 70     # wrist to flange

links:
  - name: base_link
    mesh: A0
  - name: link_1
    mesh: A1
  - name: link_2
    mesh: A2
  - name: link_3
    mesh: A3_4
    visual_xyz: [0, 0, 0.019]  # shift up 19mm to close gap with A5
  - name: link_4
    mesh: null  # virtual link (J4 colocated with J3 end)
  - name: link_5
    mesh: A5
    visual_rpy: [0, -1.5708, 0]  # STL extends along +X, rotate to Z-up
    visual_xyz: [0, 0, -0.005]  # shift down 5mm to close gap with A3_4
  - name: link_6
    mesh: A6
    visual_rpy: [0, -1.5708, 0]  # STL extends along +X, rotate to Z-up

joints:
  - name: joint_1
    type: revolute
    parent: base_link
    child: link_1
    axis: [0, 0, 1]
    limits: [-3.054, 3.054]
    origin: [0, 0, 0.093]  # d1_base = 93mm (base height to J1)

  - name: joint_2
    type: revolute
    parent: link_1
    child: link_2
    axis: [0, 1, 0]
    limits: [-1.2217, 1.5708]
    origin: [0, 0, 0.042]  # J1 to J2 = 135 - 93 = 42mm

  - name: joint_3
    type: revolute
    parent: link_2
    child: link_3
    axis: [0, 1, 0]
    limits: [-2.3562, 1.2217]
    origin: [0, 0, 0.135]  # a2 = 135mm (upper arm)

  - name: joint_4
    type: revolute
    parent: link_3
    child: link_4
    axis: [0, 0, 1]
    limits: [-2.9671, 2.9671]
    origin: [0.038, 0, 0.120]  # a3=38mm X offset + d4=120mm Z (forearm)

  - name: joint_5
    type: revolute
    parent: link_4
    child: link_5
    axis: [0, 1, 0]
    limits: [-2.0071, 2.0071]
    origin: [0, 0, 0]  # J4 and J5 are co-located

  - name: joint_6
    type: revolute
    parent: link_5
    child: link_6
    axis: [0, 0, 1]
    limits: [-3.1416, 3.1416]
    origin: [0, 0, 0.070]  # d6 = 70mm
